


<style>
:root{
--font-sans:Arial,sans-serif;--text-primary:#222;--text-secondary:#666;--text-muted:#888;
--surface-0:#eee;--surface-1:#fff;--surface-2:#fafafa;--border:#ddd;--border-strong:#bbb;
--radius:10px;--bg-accent:#e8f1ff;--text-accent:#0b57d0;--border-accent:#8ab4f8;
--bg-success:#e8f5e9;--text-success:#2e7d32;--fill-success:#2e7d32;
--bg-warning:#fff4e5;--text-warning:#9a6700;--border-warning:#f0c36d;
--bg-pro:#f3e8ff;--text-pro:#6b21a8;--fill-accent:#0b57d0;
}
body{background:#f4f6f9;max-width:1100px;margin:auto;padding:20px;line-height:1.5}
button:hover,.day-header:hover{opacity:.9}
.stat-card,.day-card,.portfolio-tip{box-shadow:0 2px 8px rgba(0,0,0,.08)}
</style>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text-primary)}
.header{padding:1.5rem 0 1rem}
.header h1{font-size:20px;font-weight:500;color:var(--text-primary)}
.header p{font-size:14px;color:var(--text-secondary);margin-top:4px}
.week-tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:var(--radius);border:0.5px solid var(--border-strong);font-size:13px;cursor:pointer;background:var(--surface-1);color:var(--text-secondary);transition:all 0.15s}
.tab.active{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent);font-weight:500}
.week-panel{display:none}.week-panel.active{display:block}
.week-label{font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:0.75rem;text-transform:none}
.day-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.day-title{display:flex;align-items:center;gap:10px}
.day-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-shopify{background:var(--bg-success);color:var(--text-success)}
.badge-meta{background:var(--bg-accent);color:var(--text-accent)}
.badge-both{background:var(--bg-pro);color:var(--text-pro)}
.badge-build{background:var(--bg-warning);color:var(--text-warning)}
.day-name{font-size:14px;font-weight:500}
.day-meta{font-size:12px;color:var(--text-muted)}
.chevron{font-size:16px;color:var(--text-muted);transition:transform 0.2s}
.day-card.open .chevron{transform:rotate(180deg)}
.day-body{display:none;padding:0 14px 12px}
.day-card.open .day-body{display:block}
.task-list{list-style:none;margin-top:6px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-top:0.5px solid var(--border);cursor:pointer}
.task-item:first-child{border-top:none}
.checkbox{width:16px;height:16px;min-width:16px;border:1.5px solid var(--border-strong);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.task-item.done .checkbox{background:var(--fill-success);border-color:var(--fill-success)}
.task-item.done .task-text{color:var(--text-muted);text-decoration:line-through}
.task-text{font-size:13px;color:var(--text-primary);line-height:1.4}
.task-note{font-size:11px;color:var(--text-muted);margin-top:2px}
.progress-bar-wrap{background:var(--surface-0);border-radius:20px;height:6px;margin:8px 0 4px;overflow:hidden}
.progress-bar{height:6px;border-radius:20px;background:var(--fill-accent);transition:width 0.3s}
.progress-label{font-size:11px;color:var(--text-muted)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--surface-1);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500;color:var(--text-primary)}
.portfolio-tip{background:var(--bg-warning);border:0.5px solid var(--border-warning);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:13px;color:var(--text-warning);display:flex;gap:8px;align-items:flex-start}
</style>

let done = new Set();

function renderWeeks(){
  const container = document.getElementById('weekPanels');
  container.innerHTML = '';
  WEEKS.forEach((week, wi) => {
    const panel = document.createElement('div');
    panel.className = 'week-panel' + (wi===0?' active':'');
    panel.id = 'week'+wi;
    panel.innerHTML = `<div class="week-label">${week.label}</div>`;
    week.days.forEach((day, di) => {
      const dayKey = `${wi}-${di}`;
      const completedTasks = day.tasks.filter((_,ti) => done.has(`${dayKey}-${ti}`)).length;
      const total = day.tasks.length;
      const pct = Math.round(completedTasks/total*100);
      const cardEl = document.createElement('div');
      cardEl.className = 'day-card';
      cardEl.id = `card-${dayKey}`;
      const badgeClass = day.badge==='shopify'?'badge-shopify':day.badge==='meta'?'badge-meta':day.badge==='build'?'badge-build':'badge-both';
      cardEl.innerHTML = `
        <div class="day-header" onclick="toggleDay('${dayKey}')">
          <div class="day-title">
            <span class="day-badge ${badgeClass}">${day.badgeLabel}</span>
            <span class="day-name">${day.name} — ${day.focus}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="day-meta">${completedTasks}/${total}</span>
            <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
          </div>
        </div>
        <div class="day-body">
          <div class="progress-bar-wrap"><div class="progress-bar" id="bar-${dayKey}" style="width:${pct}%"></div></div>
          <div class="progress-label" id="pct-${dayKey}">${pct}% complete</div>
          <ul class="task-list" id="tasks-${dayKey}">
            ${day.tasks.map((t,ti) => {
              const tKey = `${dayKey}-${ti}`;
              const isDone = done.has(tKey);
              return `<li class="task-item${isDone?' done':''}" onclick="toggleTask('${dayKey}',${ti})">
                <div class="checkbox">${isDone?'<i class="ti ti-check" style="font-size:11px;color:#fff" aria-hidden="true"></i>':''}</div>
                <div>
                  <div class="task-text">${t.text}</div>
                  ${t.note?`<div class="task-note">${t.note}</div>`:''}
                </div>
              </li>`;
            }).join('')}
          </ul>
        </div>`;
      panel.appendChild(cardEl);
    });
    container.appendChild(panel);
  });
  updateStats();
}

function toggleDay(dayKey){
  const card = document.getElementById('card-'+dayKey);
  card.classList.toggle('open');
}

function toggleTask(dayKey, ti){
  const tKey = `${dayKey}-${ti}`;
  if(done.has(tKey)) done.delete(tKey); else done.add(tKey);
  refreshDay(dayKey);
  updateStats();
}

function refreshDay(dayKey){
  const [wi,di] = dayKey.split('-').map(Number);
  const day = WEEKS[wi].days[di];
  const total = day.tasks.length;
  const completedTasks = day.tasks.filter((_,ti) => done.has(`${dayKey}-${ti}`)).length;
  const pct = Math.round(completedTasks/total*100);
  document.getElementById('bar-'+dayKey).style.width = pct+'%';
  document.getElementById('pct-'+dayKey).textContent = pct+'% complete';
  const card = document.getElementById('card-'+dayKey);
  card.querySelector('.day-meta').textContent = `${completedTasks}/${total}`;
  const ul = document.getElementById('tasks-'+dayKey);
  ul.querySelectorAll('.task-item').forEach((li,ti) => {
    const isDone = done.has(`${dayKey}-${ti}`);
    li.classList.toggle('done', isDone);
    li.querySelector('.checkbox').innerHTML = isDone?'<i class="ti ti-check" style="font-size:11px;color:#fff" aria-hidden="true"></i>':'';
  });
}

function updateStats(){
  let total = 0, completed = 0;
  WEEKS.forEach((w,wi) => w.days.forEach((d,di) => {
    d.tasks.forEach((_,ti) => { total++; if(done.has(`${wi}-${di}-${ti}`)) completed++; });
  }));
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = completed;
  document.getElementById('pctCount').textContent = Math.round(completed/total*100)+'%';
}

function showWeek(idx){
  document.querySelectorAll('.week-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
}

renderWeeks();
