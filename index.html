<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads + Shopify — 3-Week Study Plan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text: #0b0b0b;
    --text-sec: #52514e;
    --text-muted: #898781;
    --radius: 8px;
    --accent-bg: #e6f1fb;
    --accent-text: #185fa5;
    --accent-border: #b5d4f4;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-fill: #639922;
    --warning-bg: #faeeda;
    --warning-text: #854f0b;
    --pro-bg: #eeedfe;
    --pro-text: #534ab7;
    --progress-fill: #2a78d6;
    --tab-active-bg: #e6f1fb;
    --tab-active-text: #185fa5;
    --tab-active-border: #b5d4f4;
  }
  [data-mode="dark"] {
    --bg: #141413;
    --surface: #1e1e1c;
    --surface2: #252523;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f0efeb;
    --text-sec: #c3c2b7;
    --text-muted: #898781;
    --accent-bg: #0c447c;
    --accent-text: #b5d4f4;
    --accent-border: #185fa5;
    --success-bg: #173404;
    --success-text: #c0dd97;
    --success-fill: #639922;
    --warning-bg: #412402;
    --warning-text: #fac775;
    --pro-bg: #26215c;
    --pro-text: #cecbf6;
    --progress-fill: #3987e5;
    --tab-active-bg: #0c447c;
    --tab-active-text: #b5d4f4;
    --tab-active-border: #185fa5;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap; }
  .header h1 { font-size: 20px; font-weight: 500; color: var(--text); }
  .header p { font-size: 14px; color: var(--text-sec); margin-top: 3px; }
  .mode-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    background: var(--surface); color: var(--text-sec);
    font-size: 13px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .mode-btn:hover { background: var(--surface2); }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
  .portfolio-tip {
    background: var(--warning-bg); border: 0.5px solid var(--warning-text);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1rem;
    font-size: 13px; color: var(--warning-text); display: flex; gap: 8px; align-items: flex-start;
  }
  .week-tabs { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab {
    padding: 6px 14px; border-radius: var(--radius);
    border: 0.5px solid var(--border-strong);
    font-size: 13px; cursor: pointer;
    background: var(--surface); color: var(--text-sec);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--tab-active-bg); color: var(--tab-active-text);
    border-color: var(--tab-active-border); font-weight: 500;
  }
  .week-panel { display: none; }
  .week-panel.active { display: block; }
  .week-label { font-size: 13px; font-weight: 500; color: var(--text-sec); margin-bottom: 0.75rem; }
  .day-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; margin-bottom: 10px; overflow: hidden;
  }
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; user-select: none; gap: 8px;
  }
  .day-title { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; flex-wrap: wrap; }
  .day-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-shopify { background: var(--success-bg); color: var(--success-text); }
  .badge-meta { background: var(--accent-bg); color: var(--accent-text); }
  .badge-both { background: var(--pro-bg); color: var(--pro-text); }
  .badge-build { background: var(--warning-bg); color: var(--warning-text); }
  .day-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .day-meta { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .chevron { font-size: 16px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
  .day-card.open .chevron { transform: rotate(180deg); }
  .day-body { display: none; padding: 0 14px 12px; }
  .day-card.open .day-body { display: block; }
  .progress-bar-wrap { background: var(--bg); border-radius: 20px; height: 6px; margin: 8px 0 4px; overflow: hidden; }
  .progress-bar { height: 6px; border-radius: 20px; background: var(--progress-fill); transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--text-muted); }
  .task-list { list-style: none; margin-top: 6px; }
  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0; border-top: 0.5px solid var(--border); cursor: pointer;
  }
  .task-item:first-child { border-top: none; }
  .checkbox {
    width: 16px; height: 16px; min-width: 16px;
    border: 1.5px solid var(--border-strong); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .task-item.done .checkbox { background: var(--success-fill); border-color: var(--success-fill); }
  .task-item.done .task-text { color: var(--text-muted); text-decoration: line-through; }
  .task-text { font-size: 13px; color: var(--text); line-height: 1.4; }
  .task-note { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .stat-value { font-size: 18px; }
    .week-tabs { gap: 6px; }
    .tab { font-size: 12px; padding: 5px 10px; }
    .day-name { font-size: 13px; }
  }
</style>
</head>

const LS_DONE = 'studyplan_done_v1';
const LS_MODE = 'studyplan_mode_v1';
const LS_WEEK = 'studyplan_week_v1';
const LS_OPEN = 'studyplan_open_v1';

let done = new Set();
let openCards = new Set();
let currentWeek = 0;

function loadState() {
  try {
    const d = localStorage.getItem(LS_DONE);
    if (d) done = new Set(JSON.parse(d));
    const o = localStorage.getItem(LS_OPEN);
    if (o) openCards = new Set(JSON.parse(o));
    const w = localStorage.getItem(LS_WEEK);
    if (w !== null) currentWeek = parseInt(w, 10);
    const m = localStorage.getItem(LS_MODE);
    if (m === 'dark') {
      document.documentElement.setAttribute('data-mode', 'dark');
      document.getElementById('modeIcon').className = 'ti ti-sun';
      document.getElementById('modeTxt').textContent = 'Light';
    } else if (m === 'light') {
      document.documentElement.removeAttribute('data-mode');
      document.getElementById('modeIcon').className = 'ti ti-moon';
      document.getElementById('modeTxt').textContent = 'Dark';
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        document.documentElement.setAttribute('data-mode', 'dark');
        document.getElementById('modeIcon').className = 'ti ti-sun';
        document.getElementById('modeTxt').textContent = 'Light';
      }
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(LS_DONE, JSON.stringify([...done]));
    localStorage.setItem(LS_OPEN, JSON.stringify([...openCards]));
    localStorage.setItem(LS_WEEK, String(currentWeek));
  } catch(e) {}
}

function toggleMode() {
  const isDark = document.documentElement.getAttribute('data-mode') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-mode');
    document.getElementById('modeIcon').className = 'ti ti-moon';
    document.getElementById('modeTxt').textContent = 'Dark';
    try { localStorage.setItem(LS_MODE, 'light'); } catch(e) {}
  } else {
    document.documentElement.setAttribute('data-mode', 'dark');
    document.getElementById('modeIcon').className = 'ti ti-sun';
    document.getElementById('modeTxt').textContent = 'Light';
    try { localStorage.setItem(LS_MODE, 'dark'); } catch(e) {}
  }
}

function renderWeeks() {
  const container = document.getElementById('weekPanels');
  container.innerHTML = '';
  WEEKS.forEach((week, wi) => {
    const panel = document.createElement('div');
    panel.className = 'week-panel' + (wi === currentWeek ? ' active' : '');
    panel.id = 'week' + wi;
    panel.innerHTML = `<div class="week-label">${week.label}</div>`;
    week.days.forEach((day, di) => {
      const dayKey = `${wi}-${di}`;
      const isOpen = openCards.has(dayKey);
      const total = day.tasks.length;
      const completedCount = day.tasks.filter((_, ti) => done.has(`${dayKey}-${ti}`)).length;
      const pct = Math.round(completedCount / total * 100);
      const badgeClass = {shopify:'badge-shopify', meta:'badge-meta', both:'badge-both', build:'badge-build'}[day.badge];
      const card = document.createElement('div');
      card.className = 'day-card' + (isOpen ? ' open' : '');
      card.id = `card-${dayKey}`;
      card.innerHTML = `
        <div class="day-header" onclick="toggleDay('${dayKey}')">
          <div class="day-title">
            <span class="day-badge ${badgeClass}">${day.badgeLabel}</span>
            <span class="day-name">${day.name} — ${day.focus}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
            <span class="day-meta" id="meta-${dayKey}">${completedCount}/${total}</span>
            <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
          </div>
        </div>
        <div class="day-body">
          <div class="progress-bar-wrap"><div class="progress-bar" id="bar-${dayKey}" style="width:${pct}%"></div></div>
          <div class="progress-label" id="pct-${dayKey}">${pct}% complete</div>
          <ul class="task-list" id="tasks-${dayKey}">
            ${day.tasks.map((t, ti) => {
              const tKey = `${dayKey}-${ti}`;
              const isDone = done.has(tKey);
              return `<li class="task-item${isDone ? ' done' : ''}" onclick="toggleTask('${dayKey}',${ti})">
                <div class="checkbox">${isDone ? '<i class="ti ti-check" style="font-size:11px;color:#fff" aria-hidden="true"></i>' : ''}</div>
                <div>
                  <div class="task-text">${t.text}</div>
                  ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
                </div>
              </li>`;
            }).join('')}
          </ul>
        </div>`;
      panel.appendChild(card);
    });
    container.appendChild(panel);
  });
  updateTabs();
  updateStats();
}

function toggleDay(dayKey) {
  const card = document.getElementById(`card-${dayKey}`);
  const isOpen = card.classList.toggle('open');
  if (isOpen) openCards.add(dayKey); else openCards.delete(dayKey);
  saveState();
}

function toggleTask(dayKey, ti) {
  const tKey = `${dayKey}-${ti}`;
  if (done.has(tKey)) done.delete(tKey); else done.add(tKey);
  refreshDay(dayKey);
  updateStats();
  saveState();
}

function refreshDay(dayKey) {
  const [wi, di] = dayKey.split('-').map(Number);
  const day = WEEKS[wi].days[di];
  const total = day.tasks.length;
  const completedCount = day.tasks.filter((_, ti) => done.has(`${dayKey}-${ti}`)).length;
  const pct = Math.round(completedCount / total * 100);
  document.getElementById(`bar-${dayKey}`).style.width = pct + '%';
  document.getElementById(`pct-${dayKey}`).textContent = pct + '% complete';
  document.getElementById(`meta-${dayKey}`).textContent = `${completedCount}/${total}`;
  document.querySelectorAll(`#tasks-${dayKey} .task-item`).forEach((li, ti) => {
    const isDone = done.has(`${dayKey}-${ti}`);
    li.classList.toggle('done', isDone);
    li.querySelector('.checkbox').innerHTML = isDone ? '<i class="ti ti-check" style="font-size:11px;color:#fff" aria-hidden="true"></i>' : '';
  });
}

function updateStats() {
  let total = 0, completed = 0;
  WEEKS.forEach((w, wi) => w.days.forEach((d, di) => {
    d.tasks.forEach((_, ti) => {
      total++;
      if (done.has(`${wi}-${di}-${ti}`)) completed++;
    });
  }));
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = completed;
  document.getElementById('pctCount').textContent = Math.round(completed / total * 100) + '%';
}

function showWeek(idx) {
  currentWeek = idx;
  document.querySelectorAll('.week-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  updateTabs();
  saveState();
}

function updateTabs() {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentWeek));
}

loadState();
renderWeeks();
</script>
</body>
</html>
